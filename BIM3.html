<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONTROL PERSONAL BIM-3</title>

<style>

body{
font-family:Arial;
margin:0;
background:#eef2f7;
}

header{
background:#1e2a38;
color:white;
padding:15px;
display:flex;
align-items:center;
gap:15px;
}

#logo{
width:65px;
background:white;
border-radius:6px;
padding:4px;
}

.container{
padding:15px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

input,textarea,button{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#1e2a38;
color:white;
border:none;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
border-bottom:1px solid #ddd;
padding:8px;
text-align:center;
}

.alerta{
background:#ffe0e0;
}

</style>

</head>

<body>

<header>

<img src="logo.png" id="logo">

<div>

<b>CONTROL PERSONAL BIM-3 "VAPOR CUE"</b>

<div style="font-size:13px">
JEFE DE DETALL: Tte C RICHARD ARIEL ALMADA RESQUIN
</div>

</div>

</header>

<div class="container">

<div class="card">

<h3>Lista General del Personal</h3>

<textarea id="listaPersonal" rows="6"></textarea>

<button onclick="guardarLista()">Guardar Lista</button>

</div>


<div class="card">

<h3>Registrar Reposo</h3>

<input id="r_nombre" placeholder="Nombre">

<input type="date" id="r_inicio">

<input type="number" id="r_dias" placeholder="Días">

<button onclick="agregarReposo()">Agregar</button>

<table>

<thead>

<tr>
<th>Nombre</th>
<th>Inicio</th>
<th>Días</th>
<th>Fin</th>
<th>Estado</th>
</tr>

</thead>

<tbody id="tablaReposos"></tbody>

</table>

</div>


<div class="card">

<h3>Registrar Permiso</h3>

<input id="p_nombre" placeholder="Nombre">

<input type="date" id="p_fecha">

<input id="p_motivo" placeholder="Motivo">

<button onclick="agregarPermiso()">Agregar</button>

<table>

<thead>

<tr>
<th>Nombre</th>
<th>Fecha</th>
<th>Motivo</th>
</tr>

</thead>

<tbody id="tablaPermisos"></tbody>

</table>

</div>


<div class="card">

<h3>Orden del Día</h3>

<textarea id="ordenDia" rows="6"></textarea>

<button onclick="verificarOrden()">Verificar</button>

<div id="resultadoOrden"></div>

</div>


<div class="card">

<h3>Historial del Personal</h3>

<table>

<thead>

<tr>
<th>Nombre</th>
<th>Reposos</th>
<th>Permisos</th>
<th>Total</th>
</tr>

</thead>

<tbody id="tablaHistorial"></tbody>

</table>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



onst firebaseConfig = {
  apiKey: "AIzaSyBEe4ZV1UYvjbReLHtQVhwBLxPN-EMGvQU",
  authDomain: "vapor-cue.firebaseapp.com",
  projectId: "vapor-cue",
  storageBucket: "vapor-cue.firebasestorage.app",
  messagingSenderId: "703181358053",
  appId: "1:703181358053:web:c2cb2de98b51cb959a250c"
};
const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


let reposos=[]
let permisos=[]
let historial={}



async function agregarReposo(){

let nombre=document.getElementById("r_nombre").value
let inicio=document.getElementById("r_inicio").value
let dias=parseInt(document.getElementById("r_dias").value)

let fin=new Date(inicio)

fin.setDate(fin.getDate()+dias)

await addDoc(collection(db,"reposos"),{

nombre:nombre,
inicio:inicio,
dias:dias,
fin:fin.toISOString()

})

}



async function agregarPermiso(){

let nombre=document.getElementById("p_nombre").value
let fecha=document.getElementById("p_fecha").value
let motivo=document.getElementById("p_motivo").value

await addDoc(collection(db,"permisos"),{

nombre:nombre,
fecha:fecha,
motivo:motivo

})

}



onSnapshot(collection(db,"reposos"),(snapshot)=>{

reposos=[]

snapshot.forEach(doc=>{

reposos.push(doc.data())

})

mostrarReposos()

})



onSnapshot(collection(db,"permisos"),(snapshot)=>{

permisos=[]

snapshot.forEach(doc=>{

permisos.push(doc.data())

})

mostrarPermisos()

})



function mostrarReposos(){

let tabla=document.getElementById("tablaReposos")

tabla.innerHTML=""

let hoy=new Date()

reposos.forEach(r=>{

let fin=new Date(r.fin)

let aviso=new Date(fin)

aviso.setDate(aviso.getDate()-1)

let estado=""
let clase=""

if(hoy>=aviso && hoy<fin){

estado="Termina mañana"
clase="alerta"

}

if(hoy>=fin) estado="Finalizado"

tabla.innerHTML+=`<tr class="${clase}">
<td>${r.nombre}</td>
<td>${new Date(r.inicio).toLocaleDateString()}</td>
<td>${r.dias}</td>
<td>${fin.toLocaleDateString()}</td>
<td>${estado}</td>
</tr>`

})

}



function mostrarPermisos(){

let tabla=document.getElementById("tablaPermisos")

tabla.innerHTML=""

permisos.forEach(p=>{

tabla.innerHTML+=`<tr>
<td>${p.nombre}</td>
<td>${new Date(p.fecha).toLocaleDateString()}</td>
<td>${p.motivo}</td>
</tr>`

})

}



function verificarOrden(){

let lista=document.getElementById("ordenDia").value.split("\n")

let errores=[]

lista.forEach(n=>{

let reposo=reposos.find(r=>r.nombre==n && new Date()<new Date(r.fin))
let permiso=permisos.find(p=>p.nombre==n)

if(reposo) errores.push(n+" tiene reposo")
if(permiso) errores.push(n+" tiene permiso")

})

document.getElementById("resultadoOrden").innerHTML=errores.join("<br>")

}

</script>

</body>

</html>
